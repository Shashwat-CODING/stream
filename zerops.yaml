zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:0a7b88f90044204f03056df79474e9560f451778fac9481492bd7843b159ee54

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:0a7b88f90044204f03056df79474e9560f451778fac9481492bd7843b159ee54

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
