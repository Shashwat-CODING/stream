zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/streamion:main@sha256:15763b3dd84c89738331c776c7e0ab0ff5f1320848718816d71b466777a7f238

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/streamion:main@sha256:15763b3dd84c89738331c776c7e0ab0ff5f1320848718816d71b466777a7f238

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
