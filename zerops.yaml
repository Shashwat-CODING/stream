zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:11683a59d302a2cb392c73ea314bcb2881dfc5179430a336b4d55ef1b4459037

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:11683a59d302a2cb392c73ea314bcb2881dfc5179430a336b4d55ef1b4459037

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
