zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/streamion:main@sha256:7697b111dfc836004259c0f78d32d7a08f6ab44be4032759799dea2f5177206f

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/streamion:main@sha256:7697b111dfc836004259c0f78d32d7a08f6ab44be4032759799dea2f5177206f

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
