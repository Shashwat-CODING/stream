zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:d58e2e0deaff1683cca3b48860c6d67f3e0924ad0a03274fcd581afd95c3f8bd

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:d58e2e0deaff1683cca3b48860c6d67f3e0924ad0a03274fcd581afd95c3f8bd

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
