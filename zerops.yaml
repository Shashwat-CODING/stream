zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:2101c26a49493c865becea45579722ec56b0d5284ba6752e592acbf79a1b6257

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:2101c26a49493c865becea45579722ec56b0d5284ba6752e592acbf79a1b6257

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
