zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:d09c61c59389eb54ad600b807d843974d407ba0efca781fe015bbd5cba1cb614

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:d09c61c59389eb54ad600b807d843974d407ba0efca781fe015bbd5cba1cb614

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
