zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull pull ghcr.io/shashwat-coding/streamion:main

      # run your container
      start: docker run --network=host pull ghcr.io/shashwat-coding/streamion:main

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
