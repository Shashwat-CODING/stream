zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:98561efcfcdbfff448e41047214b28d2d9c148a4977b89f6e49a1f54bee14dfd

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:98561efcfcdbfff448e41047214b28d2d9c148a4977b89f6e49a1f54bee14dfd

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
