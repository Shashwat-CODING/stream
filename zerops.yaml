zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:ed5a41ce5ea50c84e87e6260c1634591bb87c66fb672facdd14936e374b706fd

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:ed5a41ce5ea50c84e87e6260c1634591bb87c66fb672facdd14936e374b706fd

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
