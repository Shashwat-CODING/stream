zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/streamion:main@sha256:3b592c919a2818942a58a3e5eb70bac656b2c7dd13ad142dd5bc249f9c604219

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/streamion:main@sha256:3b592c919a2818942a58a3e5eb70bac656b2c7dd13ad142dd5bc249f9c604219

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
