zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:ff4c5b1ccb7ec59790cb885dedf66743ffe2ffed3af6a1f1d1ee0db6318c9431

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:ff4c5b1ccb7ec59790cb885dedf66743ffe2ffed3af6a1f1d1ee0db6318c9431

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
