zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:16f10cf4610fc41630b50fb4c3ab236b484a7348d616665608101ace4bb0dfb1

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:16f10cf4610fc41630b50fb4c3ab236b484a7348d616665608101ace4bb0dfb1

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
