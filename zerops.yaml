zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:b040b0a7d0b7ed9a168baf4bb9c7ed84fc53e37dfc00f500999aaf0b36442dfa

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:b040b0a7d0b7ed9a168baf4bb9c7ed84fc53e37dfc00f500999aaf0b36442dfa

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
