zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/streamion:main@sha256:caa312467a7c3ef180002d3861abcbaf20c4db13e0719ede5d6e6167be305bc6

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/streamion:main@sha256:caa312467a7c3ef180002d3861abcbaf20c4db13e0719ede5d6e6167be305bc6

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
