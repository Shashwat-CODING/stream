zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/streamion:main@sha256:0c11425f117189df861d080b33535a71da4d9f6f1faed63410f24fc4911e3ff0

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/streamion:main@sha256:0c11425f117189df861d080b33535a71da4d9f6f1faed63410f24fc4911e3ff0

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
