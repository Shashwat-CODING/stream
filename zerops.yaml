zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:abb713b0bcbb8bc0a77ffca21b68fe81cde449d7790b53013ee8f3538c191d0a

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:abb713b0bcbb8bc0a77ffca21b68fe81cde449d7790b53013ee8f3538c191d0a

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
