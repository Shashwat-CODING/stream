zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:65ec532bd08c2da70c0122a87ab69b1844ee4975d0b1c5621592adcf618a71e9

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:65ec532bd08c2da70c0122a87ab69b1844ee4975d0b1c5621592adcf618a71e9

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
