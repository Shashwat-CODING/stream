zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:7aa0519e3d7dfc34aa74773681aeff16908512630c23540a2c17f1f4f09c1fde

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:7aa0519e3d7dfc34aa74773681aeff16908512630c23540a2c17f1f4f09c1fde

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
