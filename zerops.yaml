zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:81c91324fc67f970e674a6cb3d2b79d25bdb4c499285a5b017e374d795b74916

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:81c91324fc67f970e674a6cb3d2b79d25bdb4c499285a5b017e374d795b74916

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
