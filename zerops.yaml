zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:87389e7f90dc48d5ba911711784529db254a8af8cd781860b1f46df691d9086b

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:87389e7f90dc48d5ba911711784529db254a8af8cd781860b1f46df691d9086b

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
