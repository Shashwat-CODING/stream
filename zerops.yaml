zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:3ec133ce4cdf0fae8b2706faba66c148eb88bbcea0f0cd7c14d5b40c86688cf2

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:3ec133ce4cdf0fae8b2706faba66c148eb88bbcea0f0cd7c14d5b40c86688cf2

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
