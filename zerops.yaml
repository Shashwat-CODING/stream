zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:ca2602732f58acb474202d895252d09895a0f9160da51712567e4880ad7dad8a

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:ca2602732f58acb474202d895252d09895a0f9160da51712567e4880ad7dad8a

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
