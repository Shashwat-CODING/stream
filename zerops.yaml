zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:031e67acfd6d5646a6b12e89188066b236e7a2b83e73d895ba661cc616d9b384

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:031e67acfd6d5646a6b12e89188066b236e7a2b83e73d895ba661cc616d9b384

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
