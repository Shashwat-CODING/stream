zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:3859ea8d3a54ef6e3670a54b7efab69329e521177afed439f0c997454c5e4de1

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:3859ea8d3a54ef6e3670a54b7efab69329e521177afed439f0c997454c5e4de1

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
