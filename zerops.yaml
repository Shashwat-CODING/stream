zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:9462242d6520b44967218cbcdf903d1dfbe08cee0eb5a24dcfc6f0295028e6ae

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:9462242d6520b44967218cbcdf903d1dfbe08cee0eb5a24dcfc6f0295028e6ae

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
