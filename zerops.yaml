zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/laughing-potato:main@sha256:64fd63508e5e8f035c56a07b3cc1798a2509edd90b56a9c6ef50f45f47b1274e

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/laughing-potato:main@sha256:64fd63508e5e8f035c56a07b3cc1798a2509edd90b56a9c6ef50f45f47b1274e

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
