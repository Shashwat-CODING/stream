zerops:
  - setup: docker
    run:
      base: docker@26.1

      # pull your image from GitHub Container Registy
      prepareCommands:
        - docker pull ghcr.io/shashwat-coding/streamion:main@sha256:1b7d378a4f360acf2ab0818ab053ea9123ba4d385ce4c22bbdadd5928ec091bf

      # run your container
      start: docker run --network=host ghcr.io/shashwat-coding/streamion:main@sha256:1b7d378a4f360acf2ab0818ab053ea9123ba4d385ce4c22bbdadd5928ec091bf

      # expose port (change if your app uses something else)
      ports:
        - port: 7860
          httpSupport: true
